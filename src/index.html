<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>ENVRI-Hub Next</title>
    <link rel="shortcut icon" href="assets/img/favicon/envri-favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/favicon/envri-favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/img/favicon/envri-favicon-16x16.png" />
    <link rel="manifest" href="assets/img/favicon/manifest.json" />
    <meta name="theme-color" content="#ffffff" />
    <base href="/" />
    <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport" />
    <!-- Matomo -->
  </head>

  <body class="epos">
    <app-root></app-root>
    <!-- after content so it doesn't hinder rendering times -->
    <script>
      (function () {
        var siteIdByHost = {
          'catalogue.staging.envri.eu': '5',
          'catalogue.envri.eu': '4'
        };

        var host = window.location.hostname;
        var siteId = siteIdByHost[host];

        if (!siteId) {
          console.warn('Matomo site ID not mapped for hostname:', host);
          return;
        }

        var trackerBaseUrl = 'https://analytics.envri.eu/';
        var _paq = (window._paq = window._paq || []);

        _paq.push(['setTrackerUrl', trackerBaseUrl + 'matomo.php']);
        _paq.push(['setSiteId', siteId]);
        _paq.push(['trackPageView']);
        _paq.push(['enableLinkTracking']);

        var d = document;
        var g = d.createElement('script');
        var s = d.getElementsByTagName('script')[0];
        g.async = true;
        g.src = trackerBaseUrl + 'matomo.js';
        s.parentNode.insertBefore(g, s);
      })();
    </script>
    <!-- End Matomo Code -->
  </body>
</html>
